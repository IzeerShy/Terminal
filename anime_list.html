<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/anime-emoticon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Anime LOCAL Archive</title>
    <style>
        body { margin: 0; background: #050505; color: #00f2fe; font-family: 'Segoe UI', sans-serif; padding: 15px; padding-bottom: 50px; }
        
        .input-box { background: #111; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #00f2fe; color: #fff; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        
        /* Кнопка выбора файла */
        .file-input-label { 
            display: block; width: 100%; padding: 12px; background: #1a1a1a; border: 1px dashed #00f2fe; 
            color: #00f2fe; border-radius: 8px; text-align: center; margin-bottom: 15px; cursor: pointer; box-sizing: border-box;
        }
        #charImgFile { display: none; } /* Прячем стандартную кнопку */

        .add-btn { width: 100%; padding: 15px; background: #00f2fe; color: #000; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer; }

        /* Сетка */
        #archiveList { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Карточка */
        .card { 
            background: #111; border-radius: 12px; overflow: hidden; position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 1px solid #333; height: 200px;
        }
        
        /* Тонкие светящиеся рамки */
        .tier-S { border-color: #ffaa00; box-shadow: 0 0 10px rgba(255, 170, 0, 0.3); }
        .tier-A { border-color: #7d2ae8; box-shadow: 0 0 10px rgba(125, 42, 232, 0.3); }
        
        .img-container { width: 100%; height: 140px; overflow: hidden; }
        .char-img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            padding: 8px; background: rgba(0,0,0,0.8); color: #fff;
        }
        .info b { display: block; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info span { font-size: 0.6rem; color: #00f2fe; text-transform: uppercase; }

        .del-btn { 
            position: absolute; top: 5px; right: 5px; 
            background: rgba(255, 0, 0, 0.8); color: white; border: none; 
            border-radius: 50%; width: 24px; height: 24px; font-size: 16px; font-weight: bold; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <h1 style="font-size: 1.1rem; text-align: center; color: #fff; letter-spacing: 2px;">ANIME LOCAL VAULT</h1>

    <div class="input-box">
        <input type="text" id="charName" placeholder="Имя героя / Тайтл">
        
        <label for="charImgFile" class="file-input-label" id="fileLabel">📎 ВЫБРАТЬ ФОТО ИЗ ГАЛЕРЕИ</label>
        <input type="file" id="charImgFile" accept="image/*">
        
        <select id="charTier">
            <option value="S">Tier S (Любимчик)</option>
            <option value="A">Tier A (Круто)</option>
            <option value="B">Tier B (Норм)</option>
            <option value="Watch">Очередь</option>
        </select>
        <button class="add-btn" id="saveButton">ДОБАВИТЬ В БАЗУ</button>
    </div>

    <div id="archiveList"></div>

    <a href="hub.html" style="display: block; text-align: center; color: #444; text-decoration: none; margin-top: 40px; font-size: 0.8rem; padding-bottom: 20px;">ВЕРНУТЬСЯ В ТЕРМИНАЛ</a>

    <script>
        // Обновленный ключ для чистой базы
        const STORAGE_KEY = 'anime_local_vault_v1';
        let archive = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let currentBase64 = ''; // Сюда сохраним картинку временно

        const listDiv = document.getElementById('archiveList');
        const saveBtn = document.getElementById('saveButton');
        const fileInput = document.getElementById('charImgFile');
        const fileLabel = document.getElementById('fileLabel');

        // Обработка выбора файла
        fileInput.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Проверка размера (чтобы память телефона не забить)
            if (file.size > 2 * 1024 * 1024) { // 2 МБ макс
                alert("Файл слишком большой! Выбери фото до 2 МБ.");
                fileInput.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                // Превращаем фото в длинную строку текста (Base64)
                currentBase64 = event.target.result;
                fileLabel.innerText = "✅ ФОТО ЗАГРУЖЕНО";
                fileLabel.style.borderColor = "#00f2fe";
            };
            reader.readAsDataURL(file);
        };

        // Рендеринг
        function render() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(archive));
            listDiv.innerHTML = '';

            const tierOrder = { 'S': 1, 'A': 2, 'B': 3, 'Watch': 4 };
            archive.sort((a, b) => tierOrder[a.tier] - tierOrder[b.tier]);

            archive.forEach(item => {
                const card = document.createElement('div');
                card.className = `card tier-${item.tier}`;
                
                // Используем сохраненную строку Base64 как источник фото
                card.innerHTML = `
                    <button class="del-btn">×</button>
                    <div class="img-container">
                        <img src="${item.imgData}" class="char-img" alt="Hero">
                    </div>
                    <div class="info">
                        <b>${item.name}</b>
                        <span>${item.tier === 'Watch' ? 'Очередь' : 'Tier ' + item.tier}</span>
                    </div>
                `;

                card.querySelector('.del-btn').onclick = (e) => {
                    e.stopPropagation();
                    deleteItem(item.id);
                };

                listDiv.appendChild(card);
            });
        }

        // Добавление
        saveBtn.onclick = function() {
            const name = document.getElementById('charName').value.trim();
            const tier = document.getElementById('charTier').value;

            if (!name || !currentBase64) {
                alert("Введите имя и выберите фото!");
                return;
            }

            archive.push({
                id: Date.now(),
                name: name,
                imgData: currentBase64, // Сохраняем само фото!
                tier: tier
            });
            
            // Очистка
            document.getElementById('charName').value = '';
            currentBase64 = '';
            fileInput.value = '';
            fileLabel.innerText = "📎 ВЫБРАТЬ ФОТО ИЗ ГАЛЕРЕИ";
            fileLabel.style.borderColor = "#00f2fe";
            
            render();
        };

        function deleteItem(id) {
            archive = archive.filter(a => a.id !== id);
            render();
        }

        render();
    </script>
</body>
</html>
