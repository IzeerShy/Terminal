<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Idea Storage</title>
    <style>
        body { margin: 0; background: #050505; color: #00f2fe; font-family: 'Courier New', Courier, monospace; padding: 20px; }
        
        .input-section { background: #111; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        textarea { 
            width: 100%; height: 80px; background: #000; border: 1px solid #00f2fe; 
            color: #fff; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: none;
            font-family: inherit; margin-bottom: 10px;
        }
        
        .save-btn { 
            width: 100%; padding: 15px; background: #00f2fe; color: #000; border: none; 
            border-radius: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
        }

        .idea-card { 
            background: rgba(0, 242, 254, 0.05); border-left: 3px solid #ff00ff; 
            padding: 15px; margin-bottom: 10px; border-radius: 0 8px 8px 0; position: relative;
        }
        .idea-date { font-size: 0.6rem; color: #555; margin-bottom: 5px; }
        .idea-text { font-size: 0.9rem; line-height: 1.4; color: #e0e0e0; }
        
        .del-btn { 
            position: absolute; top: 10px; right: 10px; color: #444; 
            background: none; border: none; font-size: 1rem;
        }
        
        h2 { font-size: 0.9rem; letter-spacing: 2px; text-align: center; color: #ff00ff; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h2>IDEAS INCOMING...</h2>

    <div class="input-section">
        <textarea id="ideaInput" placeholder="Что добавим в Хаб? Какую роль сыграем?"></textarea>
        <button class="save-btn" onclick="saveIdea()">ЗАФИКСИРОВАТЬ</button>
    </div>

    <div id="ideasList"></div>

    <a href="index.html" style="display: block; text-align: center; color: #333; text-decoration: none; margin-top: 30px; font-size: 0.7rem;">ВЕРНУТЬСЯ В ТЕРМИНАЛ</a>

    <script>
        const STORAGE_KEY = 'hub_ideas_v1';
        let ideas = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

        function saveIdea() {
            const text = document.getElementById('ideaInput').value.trim();
            if(!text) return;

            const now = new Date();
            const dateStr = now.toLocaleDateString() + " " + now.toLocaleTimeString().slice(0, 5);
            
            ideas.unshift({ id: Date.now(), text, date: dateStr });
            document.getElementById('ideaInput').value = '';
            render();
        }

        function deleteIdea(id) {
            ideas = ideas.filter(i => i.id !== id);
            render();
        }

        function render() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
            const list = document.getElementById('ideasList');
            list.innerHTML = '';

            ideas.forEach(item => {
                list.innerHTML += `
                    <div class="idea-card">
                        <div class="idea-date">${item.date}</div>
                        <div class="idea-text">${item.text}</div>
                        <button class="del-btn" onclick="deleteIdea(${item.id})">×</button>
                    </div>
                `;
            });
        }

        render();
    </script>
</body>
</html>
