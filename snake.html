<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake</title>
    <style>
        body { 
            margin: 0; background: #050505; color: #00f2fe; 
            font-family: monospace; display: flex; flex-direction: column; 
            align-items: center; height: 100vh; touch-action: manipulation;
        }
        canvas { 
            border: 2px solid #00f2fe; background: #000; 
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            margin-top: 20px; max-width: 90vw;
        }
        .score { font-size: 1.5rem; margin-top: 10px; color: #ff00ff; }
        
        /* Кнопки управления */
        .controls { 
            display: grid; grid-template-columns: repeat(3, 70px); 
            grid-template-rows: repeat(2, 70px); gap: 10px; margin-top: 30px; 
        }
        .btn { 
            background: rgba(0, 242, 254, 0.1); border: 1px solid #00f2fe; 
            color: #00f2fe; border-radius: 12px; display: flex; 
            align-items: center; justify-content: center; font-size: 1.5rem;
        }
        .btn:active { background: #00f2fe; color: #000; }
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div class="score">SCORE: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas" width="300" height="300"></canvas>

    <div class="controls">
        <div class="btn up" onclick="changeDir('up')">▲</div>
        <div class="btn left" onclick="changeDir('left')">◀</div>
        <div class="btn down" onclick="changeDir('down')">▼</div>
        <div class="btn right" onclick="changeDir('right')">▶</div>
    </div>

    <a href="index.html" style="margin-top: 30px; color: #444; text-decoration: none; font-size: 0.8rem;">ВЕРНУТЬСЯ В ХАБ</a>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        const box = 20;
        let score = 0;
        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = { x: Math.floor(Math.random() * 15) * box, y: Math.floor(Math.random() * 15) * box };
        let d = "right";

        function changeDir(dir) {
            if(dir == "left" && d != "right") d = "left";
            else if(dir == "up" && d != "down") d = "up";
            else if(dir == "right" && d != "left") d = "right";
            else if(dir == "down" && d != "up") d = "down";
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00f2fe" : "#005a5f";
                ctx.shadowBlur = (i == 0) ? 10 : 0;
                ctx.shadowColor = "#00f2fe";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "#ff00ff";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff00ff";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "left") snakeX -= box;
            if( d == "up") snakeY -= box;
            if( d == "right") snakeX += box;
            if( d == "down") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                food = { x: Math.floor(Math.random() * 15) * box, y: Math.floor(Math.random() * 15) * box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("GAME OVER! Твой результат: " + score);
                location.reload();
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        let game = setInterval(draw, 150);
    </script>
</body>
</html>
