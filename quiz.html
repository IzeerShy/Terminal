<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/anime.png">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Infinity Anime Quiz</title>
    <style>
        body { margin: 0; background: #0a0a1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: #161625; width: 90%; max-width: 400px; margin-top: 30px; padding: 20px; border-radius: 20px; border: 1px solid #30304a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h2 { color: #00f2fe; font-size: 1.2rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .q-text { font-size: 1.1rem; margin-bottom: 25px; line-height: 1.4; min-height: 80px; color: #fff; }
        .options { display: grid; gap: 12px; }
        .opt-btn { background: #252545; border: 1px solid #444; color: white; padding: 15px; border-radius: 12px; font-size: 0.95rem; cursor: pointer; transition: 0.2s; text-align: left; }
        .opt-btn:active { background: #00f2fe; color: #000; }
        .progress { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        #loader { font-style: italic; color: #ff00ff; margin: 50px; }
        .restart-btn { background: #ff00ff; color: #fff; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; margin-top: 20px; box-shadow: 0 0 15px #ff00ff; }
    </style>
</head>
<body>

    <div id="loader">ПОДКЛЮЧЕНИЕ К БАЗЕ ДАННЫХ...</div>

    <div class="card" id="quiz-screen" style="display:none;">
        <div class="progress" id="progress">Вопрос 1 из 10</div>
        <div class="q-text" id="question">Загрузка...</div>
        <div class="options" id="options"></div>
    </div>

    <div class="card" id="score-screen" style="display:none;">
        <h2>ИТОГ РАУНДА</h2>
        <div style="font-size: 3.5rem; margin: 20px 0; color: #00f2fe;" id="final-score">0/10</div>
        <div id="rank-msg"></div>
        <button class="restart-btn" onclick="fetchQuestions()">СЛЕДУЮЩИЙ РАУНД</button>
        <br>
        <a href="index.html" style="color: #444; text-decoration: none; display: inline-block; margin-top: 20px; font-size: 0.8rem;">ВЫХОД В ТЕРМИНАЛ</a>
    </div>

    <script>
        let questions = [];
        let currentIdx = 0;
        let score = 0;

        // Декодирование странных символов из API (типа &quot;)
        function decodeHTML(html) {
            const txt = document.createElement("textarea");
            txt.innerHTML = html;
            return txt.value;
        }

        async function fetchQuestions() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('score-screen').style.display = 'none';

            try {
                // Запрос к API: 10 вопросов, категория 31 (Anime), сложность любая
                const response = await fetch('https://opentdb.com/api.php?amount=10&category=31&type=multiple');
                const data = await response.json();
                
                questions = data.results.map(q => {
                    const allOptions = [...q.incorrect_answers, q.correct_answer]
                        .sort(() => Math.random() - 0.5);
                    return {
                        question: decodeHTML(q.question),
                        options: allOptions.map(opt => decodeHTML(opt)),
                        correct: allOptions.indexOf(q.correct_answer)
                    };
                });

                startQuiz();
            } catch (error) {
                document.getElementById('loader').innerText = "ОШИБКА СЕТИ. ПРОВЕРЬ ИНТЕРНЕТ.";
            }
        }

        function startQuiz() {
            score = 0;
            currentIdx = 0;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('progress').innerText = `ВОПРОС ${currentIdx + 1} ИЗ 10`;
            document.getElementById('question').innerText = q.question;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(i) {
            if (i === questions[currentIdx].correct) {
                score++;
                if ("vibrate" in navigator) navigator.vibrate(40);
            } else {
                if ("vibrate" in navigator) navigator.vibrate([100, 50, 100]);
            }

            currentIdx++;
            if (currentIdx < 10) showQuestion();
            else showResult();
        }

        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('score-screen').style.display = 'block';
            document.getElementById('final-score').innerText = `${score}/10`;
            document.getElementById('rank-msg').innerText = score > 7 ? "ЭТО БЫЛО ЭПИЧНО!" : "НУЖНО БОЛЬШЕ СЕРИЙ...";
        }

        fetchQuestions();
    </script>
</body>
</html>
