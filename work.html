<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Производство: Полный Список</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 15px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #333; }
        h2 { margin: 0 0 5px 0; color: #4facfe; font-size: 1.4rem; }
        .size-label { color: #888; font-size: 0.9rem; margin-bottom: 15px; display: block; }
        
        .presets { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .preset-btn { background: #2d2d2d; color: #fff; border: 1px solid #444; padding: 10px 5px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; }
        .preset-btn span { display: block; font-size: 0.7rem; color: #4facfe; }

        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #444; border-radius: 10px; background: #2d2d2d; color: white; box-sizing: border-box; font-size: 16px; }
        
        .btn-add { background: linear-gradient(45deg, #28a745, #218838); color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; }
        .btn-main { background: linear-gradient(45deg, #007bff, #0056b3); color: white; width: 100%; padding: 25px 10px; border: none; border-radius: 15px; font-size: 1.5rem; font-weight: bold; margin: 15px 0; }
        
        .progress-container { background: #333; height: 16px; border-radius: 8px; margin: 15px 0; overflow: hidden; }
        .progress-bar { background: #4facfe; height: 100%; width: 0%; transition: width 0.4s; }
        
        .stats { display: flex; justify-content: space-between; font-size: 0.95rem; }
        .forecast { color: #ffeb3b; text-align: center; font-size: 1rem; margin: 10px 0; font-weight: bold; }
        .flex-row { display: flex; justify-content: space-between; gap: 10px; }
        .btn-pause { background: #6c757d; color: white; padding: 10px; border-radius: 10px; border: none; width: 48%; }
        .btn-pause.active { background: #ffc107; color: #000; }
        .btn-del { border: 1px solid #ff5252; color: #ff5252; background: none; padding: 10px; border-radius: 10px; width: 48%; }
    </style>
</head>
<body>

    <div id="setup-screen" class="card">
        <h2>📦 Выбор изделия</h2>
        <div class="presets">
            <button class="preset-btn" onclick="apply('ГСК Тип 1', 1400, 200, 'Малые')">ГСК 1<span>68х42</span></span></button>
            <button class="preset-btn" onclick="apply('ГСК Тип 2', 1050, 175, 'Большие')">ГСК 2<span>68х60</span></button>
            <button class="preset-btn" onclick="apply('Муфта', 1500, 20, '15 мм')">Муфта<span>15 мм</span></button>
            <button class="preset-btn" onclick="apply('Провода', 800, 20, '150 мм')">Провода<span>150 мм</span></button>
            <button class="preset-btn" onclick="apply('Корпус Т1', 2376, 132, 'Малый')">Корпус 1<span>70х70х40</span></button>
            <button class="preset-btn" onclick="apply('Корпус Т2', 2415, 105, 'Большой')">Корпус 2<span>80х80х40</span></button>
            <button class="preset-btn" onclick="apply('ОКЛ', 660, 10, 'Комплект')">ОКЛ<span>19-20</span></button>
        </div>

        <input type="text" id="name" placeholder="Название">
        <input type="text" id="size" placeholder="Размер (напр. 15 мм)">
        <input type="number" id="total" placeholder="План (шт)">
        <input type="number" id="incr" placeholder="Штук за клик">
        
        <button class="btn-add" onclick="startShift()">НАЧАТЬ СМЕНУ</button>
    </div>

    <div id="work-screen"></div>

    <script>
        let task = JSON.parse(localStorage.getItem('prod_task_final')) || null;

        function apply(name, total, incr, size) {
            document.getElementById('name').value = name;
            document.getElementById('total').value = total;
            document.getElementById('incr').value = incr;
            document.getElementById('size').value = size;
            if ("vibrate" in navigator) navigator.vibrate(30);
        }

        function startShift() {
            const name = document.getElementById('name').value;
            const size = document.getElementById('size').value;
            const total = parseInt(document.getElementById('total').value);
            const incr = parseInt(document.getElementById('incr').value) || 1;

            if (name && total > 0) {
                task = { name, size, total, incr, current: 0, startTime: Date.now(), pausedTime: 0, pauseStart: null, isPaused: false };
                saveAndRender();
            }
        }

        function togglePause() {
            if (!task) return;
            if (!task.isPaused) { task.isPaused = true; task.pauseStart = Date.now(); }
            else { task.isPaused = false; task.pausedTime += (Date.now() - task.pauseStart); task.pauseStart = null; }
            saveAndRender();
        }

        function addProgress() {
            if (!task || task.isPaused) return;
            if ("vibrate" in navigator) navigator.vibrate(50);
            task.current += task.incr;
            if (task.current > task.total) task.current = task.total;
            saveAndRender();
        }

        function saveAndRender() {
            const screen = document.getElementById('work-screen');
            const setup = document.getElementById('setup-screen');
            if (!task) { setup.style.display = 'block'; screen.innerHTML = ''; localStorage.removeItem('prod_task_final'); return; }

            setup.style.display = 'none';
            localStorage.setItem('prod_task_final', JSON.stringify(task));

            const perc = ((task.current / task.total) * 100).toFixed(1);
            let activeMs = Date.now() - task.startTime - task.pausedTime;
            if (task.isPaused) activeMs -= (Date.now() - task.pauseStart);
            const rate = task.current > 0 ? Math.round(task.current / (activeMs / 3600000)) : 0;
            
            let forecast = "Считаю...";
            if (rate > 0) {
                const finish = new Date(Date.now() + ((task.total - task.current) / rate) * 3600000);
                forecast = `Финиш в ${finish.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
            }

            screen.innerHTML = `
                <div class="card">
                    <h2>${task.name}</h2>
                    <span class="size-label">Размер: ${task.size}</span>
                    <div style="text-align:center; color:#ffc107; font-weight:bold; margin-bottom:10px; display:${task.isPaused?'block':'none'}">⏸ ПАУЗА</div>
                    <div class="stats"><span>${task.current} / ${task.total} шт.</span><span>${perc}%</span></div>
                    <div class="progress-container"><div class="progress-bar" style="width:${perc}%"></div></div>
                    <div class="stats"><span>Скорость: ${rate} шт/ч</span><span>Осталось: ${task.total-task.current}</span></div>
                    <button class="btn-main" onclick="addProgress()" ${task.isPaused?'style="opacity:0.3"':''}>+ ${task.incr}</button>
                    <div class="forecast">${task.current >= task.total ? "ГОТОВО!" : forecast}</div>
                    <div class="flex-row">
                        <button class="btn-pause ${task.isPaused?'active':''}" onclick="togglePause()">${task.isPaused?'▶':'⏸ ПАУЗА'}</button>
                        <button class="btn-del" onclick="reset()">СБРОС</button>
                    </div>
                </div>
            `;
        }

        function reset() { if(confirm("Сбросить?")) { task = null; saveAndRender(); } }
        setInterval(saveAndRender, 30000);
        saveAndRender();
    </script>
</body>
</html>
