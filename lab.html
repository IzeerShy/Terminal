<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB-7 TERMINAL</title>
    <style>
        body {
            background: #050505;
            color: #00f2fe;
            font-family: 'Courier New', monospace;
            padding: 20px;
            margin: 0;
            text-transform: uppercase;
        }

        .header {
            border-bottom: 2px solid #00f2fe;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00f2fe;
        }

        .status-bar {
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #555;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #111;
            border: 1px solid #00f2fe66;
            color: #fff;
            padding: 15px;
            box-sizing: border-box;
            font-family: inherit;
            margin-bottom: 15px;
            outline: none;
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: none;
            border: 1px solid #00f2fe;
            color: #00f2fe;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
        }

        button:active {
            background: #00f2fe;
            color: #000;
        }

        #logHistory {
            margin-top: 30px;
            font-size: 0.85rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .log-entry {
            border-left: 3px solid #ff00ff;
            padding-left: 15px;
            margin-bottom: 15px;
            animation: flicker 0.5s ease-in;
        }

        .log-time { color: #ff00ff; font-weight: bold; margin-right: 10px; }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: #555;
            text-decoration: none;
            font-size: 0.7rem;
        }

        @keyframes flicker {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="header">
    SCIENTIST TERMINAL // ACCESS GRANTED
</div>

<div class="status-bar">
    <span>OS: LAB-CORE v4</span>
    <span>CONNECTION: ENCRYPTED</span>
</div>

<textarea id="logInput" placeholder="ВВЕДИТЕ ДАННЫЕ НАБЛЮДЕНИЯ ИЛИ ОТЧЕТ ОБ ОБЪЕКТЕ..."></textarea>

<button onclick="saveLog()">[ ЗАНЕСТИ В ПРОТОКОЛ ]</button>

<div id="logHistory">
    </div>

<a href="index.html" class="back-btn"><< ВЕРНУТЬСЯ В ГЛАВНЫЙ ХАБ</a>

<script>
    // 1. ЗАГРУЗКА ПРИ ОТКРЫТИИ
    document.addEventListener("DOMContentLoaded", function() {
        const history = document.getElementById('logHistory');
        const savedData = localStorage.getItem('labLogs');
        
        if (savedData && history) {
            history.innerHTML = savedData;
            console.log("Данные успешно загружены из памяти");
        }
    });

    // 2. СОХРАНЕНИЕ
    function saveLog() {
        const input = document.getElementById('logInput');
        const history = document.getElementById('logHistory');
        
        if (!input || !history) {
            alert("Ошибка: Элементы интерфейса не найдены!");
            return;
        }

        if (input.value.trim() !== "") {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + 
                         now.getMinutes().toString().padStart(2, '0');
            
            // Создаем новую запись
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[LOG ${time}]</span> ${input.value}`;
            
            // Добавляем в список
            history.prepend(entry);
            
            // ЗАПИСЬ В ПАМЯТЬ
            try {
                localStorage.setItem('labLogs', history.innerHTML);
                input.value = ""; // Очистка поля
            } catch (e) {
                alert("Память переполнена или заблокирована!");
            }
        }
    }
</script>



</body>
</html>
